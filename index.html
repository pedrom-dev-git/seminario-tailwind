<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Seminário Tailwind — App interativa</title>

  <!-- Tailwind + React, tudo via CDN. Zero instalação, zero build. -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100 p-6">

  <div id="app"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      // useState guarda a lista de produtos. Mudou a lista -> a tela se redesenha.
      const [produtos, setProdutos] = useState(["Fone", "Teclado", "Webcam"]);
      const [nome, setNome] = useState("");

      function adicionar() {
        if (nome === "") return;
        setProdutos([...produtos, nome]); // adiciona um card
        setNome("");
      }

      function remover(i) {
        setProdutos(produtos.filter((_, x) => x !== i)); // tira o card
      }

      return (
        <div>
          <h1 className="text-2xl font-bold mb-4">Produtos</h1>

          <input
            value={nome}
            onChange={(e) => setNome(e.target.value)}
            placeholder="Nome do produto"
            className="border p-2 rounded mr-2"
          />
          <button onClick={adicionar} className="bg-indigo-600 text-white px-4 py-2 rounded">
            ＋ Adicionar
          </button>

          {/* grid-cols-1 md:grid-cols-3 = 1 coluna no celular, 3 no PC.
              O "md:" vira media query sozinho. */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
            {produtos.map((item, i) => (
              <div key={i} className="bg-white p-5 rounded-xl shadow">
                <h2 className="font-semibold">{item}</h2>
                <button onClick={() => remover(i)} className="text-red-500 text-sm mt-2">
                  remover
                </button>
              </div>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>

</body>
</html>
