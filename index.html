<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Seminário Tailwind — App com framework (React)</title>

  <!-- Tailwind + React, tudo via CDN. Zero instalação, zero build. -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100 p-6">

  <div id="app"></div>

  <script type="text/babel">
    const { useState } = React;

    // Card: a "sopa de classes" Tailwind aparece UMA vez aqui.
    // Recebe o nome e a ação de remover por props. Reusável.
    function Card({ nome, onRemover }) {
      return (
        <article className="bg-white p-5 rounded-xl shadow flex flex-col gap-2">
          <h2 className="font-semibold">{nome}</h2>
          <button onClick={onRemover} className="text-red-500 text-sm self-start">
            remover
          </button>
        </article>
      );
    }

    function App() {
      // produtos = a lista (estado). nome = o texto digitado.
      const [produtos, setProdutos] = useState(["Fone", "Teclado", "Webcam"]);
      const [nome, setNome] = useState("");

      function adicionar() {
        const limpo = nome.trim();
        if (!limpo) return;                 // não adiciona vazio
        setProdutos([...produtos, limpo]);  // lista nova = antigos + 1
        setNome("");                        // limpa o campo
      }

      function remover(i) {
        setProdutos(produtos.filter((_, x) => x !== i)); // tira o de posição i
      }

      return (
        <main className="max-w-4xl mx-auto">
          <h1 className="text-2xl font-bold mb-4">Produtos</h1>

          {/* form: o Enter funciona e não recarrega a página */}
          <form
            className="flex flex-col sm:flex-row gap-2 mb-6"
            onSubmit={(e) => { e.preventDefault(); adicionar(); }}
          >
            <input
              value={nome}
              onChange={(e) => setNome(e.target.value)}
              placeholder="Nome do produto"
              className="flex-1 border border-slate-300 p-2 rounded"
            />
            <button type="submit" className="bg-indigo-600 text-white px-5 py-2 rounded">
              ＋ Adicionar
            </button>
          </form>

          {/* grid-cols-1 sm:2 md:3 = responsivo sem escrever @media.
              O HTML aqui fica LIMPO: só <Card> reusado. */}
          <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
            {produtos.map((nomeProduto, i) => (
              <Card
                key={i}
                nome={nomeProduto}
                onRemover={() => remover(i)}
              />
            ))}
          </div>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>

</body>
</html>
