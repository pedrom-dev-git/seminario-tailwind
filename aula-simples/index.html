<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 p-6">

  <h1 class="text-2xl font-bold mb-4">Produtos</h1>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

    <div class="bg-white p-5 rounded-xl shadow flex flex-col gap-2">
      <h2 class="font-semibold">Fone</h2>
      <p class="text-slate-500 text-sm">Bluetooth, 30h de bateria.</p>
      <button class="bg-indigo-600 text-white py-2 rounded mt-2">Comprar</button>
    </div>

    <div class="bg-white p-5 rounded-xl shadow flex flex-col gap-2">
      <h2 class="font-semibold">Teclado</h2>
      <p class="text-slate-500 text-sm">Mecânico, retroiluminado.</p>
      <button class="bg-indigo-600 text-white py-2 rounded mt-2">Comprar</button>
    </div>

    <div class="bg-white p-5 rounded-xl shadow flex flex-col gap-2">
      <h2 class="font-semibold">Webcam</h2>
      <p class="text-slate-500 text-sm">1080p, foco automático.</p>
      <button class="bg-indigo-600 text-white py-2 rounded mt-2">Comprar</button>
    </div>

  </div>

</body>
</html>
